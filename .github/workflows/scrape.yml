name: Scrape AMC showtimes

# Playwright can't run on Vercel's serverless functions, so ingestion lives here:
# a scheduled runner scrapes AMC and writes to the shared Neon Postgres that the
# Vercel app reads from. Set the DATABASE_URL repo secret to the Neon connection
# string (postgresql://...). Trigger manually from the Actions tab via run-workflow.
on:
  schedule:
    - cron: "0 9 * * *" # once a day, 09:00 UTC (~4am Chicago)
  workflow_dispatch:
    inputs:
      days:
        description: "Days ahead to scrape"
        required: false
        default: "90"
      force:
        description: "Force re-enrich all movies (ignore staleness)"
        required: false
        default: "false"

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write # to commit the refreshed snapshot back to the repo
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PRISMA_DB_PROVIDER: postgresql
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }} # posters; scrape still works if unset
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Point Prisma at Postgres and generate client
        run: |
          node scripts/db-provider.mjs
          npx prisma generate

      # Neon's free tier scales compute to zero when idle, so the first connection
      # of the day can hit a cold start and fail (P1001 "can't reach database
      # server"). Retry a few times to let the endpoint wake before giving up.
      - name: Ensure DB schema (idempotent)
        run: |
          for i in 1 2 3 4 5; do
            if npx prisma db push; then
              exit 0
            fi
            echo "prisma db push failed (attempt $i/5) — Neon may be waking; retrying in 15s..."
            sleep 15
          done
          echo "::error::prisma db push failed after 5 attempts (database unreachable)"
          exit 1

      # Cache the ~150MB Chromium binary across runs (keyed on the lockfile so it
      # invalidates when the Playwright version changes). On a hit, the install
      # below skips the download and only sets up OS deps.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Scrape
        env:
          ENRICH_FORCE: ${{ github.event.inputs.force }}
        run: npm run scrape -- --days "${{ github.event.inputs.days || '90' }}"

      # Keep the bundled fallback (served when DATABASE_URL is unset) in sync with
      # the freshly-scraped DB. [skip ci] avoids triggering a Vercel redeploy,
      # since the live app reads from the DB, not this snapshot.
      - name: Refresh bundled snapshot
        run: npm run snapshot

      - name: Commit snapshot if changed
        run: |
          if git diff --quiet -- src/data/snapshot.json; then
            echo "snapshot unchanged — nothing to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/snapshot.json
            git commit -m "chore: refresh bundled snapshot [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi
